    </svg>
  );};
  const NavCheck=({active})=>{const c=active?'var(--primary)':'#A09AB8';return(
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
      <rect x="4" y="6" width="24" height="20" rx="5" fill={active?'var(--pl)':'var(--pale)'} stroke={c} strokeWidth="2"/>
      <path d="M10 16 L14 20 L22 12" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );};
  const NavPin=({active})=>{const c=active?'var(--primary)':'#A09AB8';return(
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
      <path d="M16 4 C11 4 7 8 7 13 C7 20 16 28 16 28 C16 28 25 20 25 13 C25 8 21 4 16 4Z" fill={active?'var(--pl)':'var(--pale)'} stroke={c} strokeWidth="2"/>
      <circle cx="16" cy="13" r="4" fill={c} opacity="0.7"/>
    </svg>
  );};
  const NavStats=({active})=>{const c=active?'var(--primary)':'#A09AB8';return(
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
      <rect x="4" y="18" width="5" height="10" rx="2" fill={active?'var(--primary-mid)':'var(--pl)'} stroke={c} strokeWidth="1.8" opacity={active?0.9:0.5}/>
      <rect x="11" y="12" width="5" height="16" rx="2" fill={active?'var(--primary-mid)':'var(--pl)'} stroke={c} strokeWidth="1.8" opacity={active?0.9:0.5}/>
      <rect x="18" y="6" width="5" height="22" rx="2" fill={active?'var(--primary-mid)':'var(--pl)'} stroke={c} strokeWidth="1.8" opacity={active?0.9:0.5}/>
      <path d="M6.5 15 L13.5 9 L20.5 5" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.6"/>
    </svg>
  );};
  const tabInfo=[
    {id:'cal',   NavIcon:NavCal,   label:'カレンダー'},
    {id:'fixed', NavIcon:NavPin,   label:'固定予定'},
    {id:'today', NavIcon:NavToday, label:'今日'},
    {id:'tasks', NavIcon:NavCheck, label:'タスク'},
    {id:'stats', NavIcon:NavStats, label:'記録'},
  ];

  const fabModeMap={today:'event',cal:'event',tasks:'task',fixed:'fixed'};
  const skips=data.skips||{};

  // DayView helper (shared by 'today' and 'cal' tabs)
  const renderDayView=(dateStr,onBack)=>(
    <DayView
      dateStr={dateStr}
      data={data}
      onBack={onBack}
      onAddEvent={()=>openAdd('event',dateStr)}
      onOpenPomodoro={task=>setPomodoroTask(task===null?null:task)}
      onDelEvent={delEvent}
      skips={skips}
      onToggleSkip={toggleSkip}
    />
  );

  return(
    <div className="app">
      <div className="hdr">
        <div className="hdr-row">
          <div>
            <div className="hdr-title">
              <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
                <circle cx="16" cy="17" r="11" fill="rgba(255,255,255,0.35)" stroke="white" strokeWidth="2"/>
                <path d="M16 11 L16 17 L20 20" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M10 5 L14 8 M22 5 L18 8" stroke="white" strokeWidth="2" strokeLinecap="round"/>
              </svg>
              スキマ
            </div>
            <div className="hdr-sub">
              {selDate&&tab==='cal'
                ? (() => { const d=new Date(selDate+'T00:00:00');
                    return `${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;})()
                : new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'})
              }
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,position:'relative'}}>
            <div className="hdr-badge">
              今日の空き {tfh>0?`${tfh}h`:''}{tfm>0?`${tfm}m`:tf===0?'0m':''}
            </div>
            <button onClick={()=>setShowTheme(v=>!v)} title="テーマ変更" style={{
              background:'rgba(255,255,255,0.25)',border:'none',borderRadius:'50%',
              padding:0,cursor:'pointer',width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
            }}>
              <div style={{width:18,height:18,borderRadius:'50%',background:THEMES[themeId]?.primary||'var(--primary)',border:'2.5px solid white',boxShadow:'0 1px 4px rgba(0,0,0,0.2)'}}/>
            </button>
            {isGuest
              ? <button onClick={()=>{setIsGuest(false);setData(null);}} title="ログインして保存" style={{
                  background:'rgba(255,255,255,0.25)',border:'none',borderRadius:8,
                  padding:'4px 8px',cursor:'pointer',color:'white',fontSize:11,fontFamily:'inherit',fontWeight:700
                }}>ログイン</button>
              : <button onClick={()=>auth.signOut()} title="ログアウト" style={{
                  background:'rgba(255,255,255,0.25)',border:'none',borderRadius:8,
                  padding:'4px 8px',cursor:'pointer',color:'white',fontSize:11,fontFamily:'inherit',fontWeight:700
                }}>ログアウト</button>
            }
            {showTheme&&(
              <div style={{
                position:'absolute',top:'calc(100% + 8px)',right:0,
                background:'white',borderRadius:14,padding:'12px 14px',
                boxShadow:'0 4px 24px rgba(0,0,0,0.13)',zIndex:200,
                display:'flex',flexDirection:'column',gap:8,minWidth:140,
              }}>
                <div style={{fontSize:11,color:'#A09AB8',fontWeight:700,marginBottom:2}}>テーマカラー</div>
                {Object.entries(THEMES).map(([id,t])=>(
                  <button key={id} onClick={()=>changeTheme(id)} style={{
                    display:'flex',alignItems:'center',gap:8,padding:'6px 8px',
                    background:themeId===id?t.pl:'none',border:themeId===id?`1.5px solid ${t.primary}`:'1.5px solid transparent',
                    borderRadius:8,cursor:'pointer',fontFamily:'inherit',fontSize:13,color:'var(--text)',fontWeight:themeId===id?700:400,
                  }}>
                    <div style={{width:14,height:14,borderRadius:'50%',background:t.grad,flexShrink:0}}/>
                    {t.name}
                  </button>
                ))}
                <div style={{borderTop:'1px solid var(--border)',marginTop:4,paddingTop:8}}>
                  <button onClick={()=>{
                    setShowTheme(false);
                    if(window.confirm('データをリセットしますか？\nタスク・固定予定・記録がすべて初期状態に戻ります。')){
                      const d=defaults();
                      mutate(()=>d);
                    }
                  }} style={{
                    width:'100%',padding:'7px 8px',background:'none',border:'1.5px solid #FCA5A5',
                    borderRadius:8,cursor:'pointer',fontFamily:'inherit',fontSize:12,color:'#EF4444',fontWeight:700,
                  }}>データをリセット</button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      {isGuest&&(
        <div style={{background:'#FEF3C7',borderBottom:'1px solid #FCD34D',padding:'6px 16px',fontSize:11,color:'#92400E',display:'flex',alignItems:'center',gap:8,justifyContent:'center'}}>
          ⚠️ ゲストモード：データはブラウザを閉じると消えます
          <button onClick={()=>{setIsGuest(false);setData(null);}} style={{background:'#F59E0B',border:'none',borderRadius:6,padding:'2px 8px',fontSize:11,color:'white',cursor:'pointer',fontFamily:'inherit',fontWeight:700}}>ログインして保存</button>
        </div>
      )}
      <div className="screen">
        {tab==='today'&&renderDayView(todayStr,null)}
        {tab==='cal'&&(
          selDate
            ? renderDayView(selDate,()=>setSelDate(null))
            : <>
                <CountdownBanner events={data.events}/>
                <div className="cal-toggle">
                  <button className={`cal-toggle-btn${calMode==='month'?' on':''}`} onClick={()=>setCalMode('month')}>月</button>
                  <button className={`cal-toggle-btn${calMode==='week'?' on':''}`} onClick={()=>setCalMode('week')}>週</button>
                </div>
                {calMode==='month'
                  ? <MonthCalendar events={data.events} selectedDate={selDate} onSelectDate={d=>setSelDate(d)}/>
                  : <WeekView data={data} skips={skips} onSelectDate={d=>{setSelDate(d);}}/>
                }
              </>
        )}
        {tab==='tasks'&&<TasksScreen tasks={data.tasks} onDel={delTask} onEdit={t=>openEdit(t,'task')} completions={data.completions||{}} onToggle={toggleCompletion} onPomodoro={t=>setPomodoroTask(t)} onLog={handleLog}/>}
        {tab==='fixed'&&<FixedScreen blocks={data.fixedBlocks} onDel={delFixed} onEdit={b=>openEdit(b,'fixed')}/>}
        {tab==='stats'&&<StatsScreen data={data}/>}
      </div>

      {tab!=='stats'&&tab!=='today'&&<button className="fab" onClick={()=>openAdd(fabModeMap[tab]||'task',selDate||'')}>＋</button>}
      {tab==='today'&&<button className="fab" onClick={()=>openAdd('event',todayStr)}>＋</button>}

      <nav className="bnav">
        {tabInfo.map(n=>(
          <button key={n.id} className={`ni${tab===n.id?' on':''}`}
            onClick={()=>{setTab(n.id);if(n.id!=='cal')setSelDate(null);}}>
            <span className="ni-icon"><n.NavIcon active={tab===n.id}/></span>{n.label}
          </button>
        ))}
      </nav>

      {pomodoroTask!==undefined&&(
        <PomodoroModal
          onClose={()=>setPomodoroTask(undefined)}
          onSave={entry=>{handleLog(entry);setPomodoroTask(undefined);}}
          tasks={data.tasks}
          dateStr={tab==='today'?todayStr:selDate||todayStr}
          preTask={pomodoroTask}
        />
      )}
      {showAdd&&(
        <AddModal
          onClose={()=>{setShowAdd(false);setEditItem(null);}}
          onAdd={handleAdd}
          onUpdate={handleUpdate}
          defaultMode={addMode}
          defaultDate={addDate}
          editItem={editItem}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
