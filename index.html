<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>スキマ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --primary:#A78BFA;--primary-mid:#C4B5FD;--pl:#EDE9FE;--pale:#F3F0FB;
      --bg:#FBF8FF;--card:#fff;--text:#4B4569;--muted:#A09AB8;--border:#EDE9FE;
      --grad:var(--grad);
      --shadow:0 2px 16px rgba(167,139,250,.12);--r:18px;--rs:12px;
    }
    html,body,#root{height:100%;overflow-x:hidden}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
    .app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

    /* Header */
    .hdr{background:var(--grad);padding:13px 18px 11px;color:#fff;position:sticky;top:0;z-index:100}
    .hdr-row{display:flex;justify-content:space-between;align-items:center}
    .hdr-title{font-size:19px;font-weight:900;display:flex;align-items:center;gap:7px}
    .hdr-sub{font-size:11px;opacity:.85;margin-top:2px}
    .hdr-badge{background:rgba(255,255,255,.3);border-radius:100px;padding:4px 11px;font-size:11px;font-weight:700}

    /* Nav */
    .bnav{background:#fff;border-top:1px solid var(--border);display:flex;position:sticky;bottom:0;z-index:100}
    .ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px 13px;border:none;background:none;cursor:pointer;font-size:10px;font-family:inherit;color:var(--muted)}
    .ni.on{color:var(--primary)}
    .ni-icon{font-size:21px;display:flex;align-items:center;justify-content:center}

    /* Screen */
    .screen{flex:1;overflow-y:auto;padding:14px 14px 90px}

    /* ── MONTHLY CALENDAR ── */
    .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .cal-nav-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--primary);padding:4px 10px}
    .cal-month{font-size:17px;font-weight:900;color:var(--text)}
    .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
    .cal-dow-cell{text-align:center;font-size:11px;font-weight:700;padding:4px 0;color:var(--muted)}
    .cal-dow-cell:first-child{color:#F87171}
    .cal-dow-cell:last-child{color:#60A5FA}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .cal-cell{min-height:56px;display:flex;flex-direction:column;align-items:stretch;padding:4px 2px 3px;border-radius:8px;cursor:pointer;position:relative}
    .cal-cell:active{background:var(--pl)}
    .cal-cell.other{opacity:.3}
    .cal-cell.today .cal-num{background:var(--primary);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto}
    .cal-cell.selected{background:var(--pl)}
    .cal-cell.selected .cal-num{color:var(--primary);font-weight:900}
    .cal-num{font-size:12px;font-weight:500;line-height:1;text-align:center;margin-bottom:3px}
    .cal-num.sun{color:#F87171}
    .cal-num.sat{color:#60A5FA}
    .cal-ev{font-size:9px;font-weight:700;border-radius:3px;padding:1px 3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
    .cal-more{font-size:8px;color:var(--muted);text-align:center}

    /* ── DAY VIEW ── */
    .day-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .back-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--primary);padding:2px}
    .day-title{font-size:16px;font-weight:900}
    .day-badge{margin-left:auto;background:var(--pl);color:var(--primary);border-radius:100px;padding:3px 10px;font-size:11px;font-weight:700}

    .summary-card{background:var(--grad);border-radius:var(--r);padding:14px 16px;color:#fff;margin-bottom:14px}
    .sum-label{font-size:11px;opacity:.8;margin-bottom:3px}
    .sum-val{font-size:22px;font-weight:900}
    .sum-sub{font-size:12px;opacity:.8;margin-left:5px;font-weight:400}
    .slot-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
    .slot-chip{background:rgba(255,255,255,.2);border-radius:100px;padding:2px 9px;font-size:10px}

    /* Timeline */
    .tl-wrap{display:flex}
    .tl-hours{width:36px;position:relative;flex-shrink:0}
    .tl-hlabel{position:absolute;right:4px;font-size:9px;color:#9E9E9E;font-weight:500;transform:translateY(-6px)}
    .tl-events{flex:1;position:relative;border-left:2px solid #E0E0E0}
    .tl-main{position:absolute;left:0;right:34%;top:0;bottom:0}
    .tl-flex{position:absolute;right:0;width:33%;top:0;bottom:0;border-left:1px dashed #E0E0E0}
    .tl-flex-label{position:absolute;top:-18px;left:0;right:0;font-size:9px;color:#B0A8C8;font-weight:700;text-align:center}
    .tl-hline{position:absolute;left:0;right:0;border-top:1px solid #F0F0F0;pointer-events:none}
    .tl-hline.maj{border-top-color:#E0E0E0;border-top-width:1.5px}
    .tl-now{position:absolute;left:-6px;right:0;border-top:2px solid var(--primary-mid);z-index:20;pointer-events:none}
    .tl-now::before{content:'';position:absolute;left:-3px;top:-5px;width:8px;height:8px;background:var(--primary-mid);border-radius:50%}
    .block{position:absolute;left:2px;right:2px;border-radius:7px;padding:4px 6px;overflow:hidden;z-index:10}
    .block-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .block-time{font-size:9px;margin-top:1px;opacity:.75}
    .flex-block{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 5px;overflow:hidden;z-index:10;border-style:dashed;border-width:1.5px}
    .flex-block-name{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
    .flex-block-dur{font-size:9px;opacity:0.75;margin-top:1px}
    .free-slot{position:absolute;left:2px;right:2px;border-radius:7px;background:#F0FDF4;border:1.5px dashed #86EFAC;overflow:hidden;z-index:5;padding:4px 6px}
    .free-label{font-size:9px;color:#6EAF84;font-weight:700}
    .free-sugs{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
    .free-chip{background:#fff;border:1px solid #86EFAC;border-radius:100px;padding:2px 7px;font-size:9px;color:#5A9E72;cursor:pointer;font-family:inherit;line-height:1.4}
    .free-chip:active{background:#DCFCE7}
    .free-log-btn{background:none;border:none;font-size:8px;color:#86EFAC;cursor:pointer;font-family:inherit;padding:2px 0;margin-top:2px;display:flex;align-items:center;gap:2px;font-weight:700}
    .rec-card{background:linear-gradient(135deg,var(--pale),#fff);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:12px}
    .rec-title{font-size:11px;font-weight:800;color:var(--primary);margin-bottom:6px;display:flex;align-items:center;gap:4px}
    .rec-item{display:flex;align-items:center;justify-content:space-between;width:100%;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;font-size:12px;font-family:inherit;cursor:pointer;gap:8px;margin-bottom:4px;text-align:left}
    .rec-item:last-child{margin-bottom:0}
    .rec-item:active{background:var(--pl)}
    .rec-dur{font-size:10px;color:#A09AB8;flex-shrink:0}
    .move-ring-wrap{display:flex;align-items:center;gap:14px;background:var(--pale);border-radius:var(--rs);padding:12px 16px;margin-bottom:14px}
    .move-ring-info{display:flex;flex-direction:column;gap:3px}
    .move-ring-label{font-size:11px;color:#A09AB8;font-weight:600}
    .move-ring-count{font-size:18px;font-weight:900;color:var(--primary);line-height:1}
    .qlog-row{display:flex;align-items:center;gap:8px;background:var(--pl);border-radius:10px;padding:8px 10px;margin-bottom:6px}
    .qlog-input{width:56px;border:1.5px solid var(--border);border-radius:8px;padding:4px 6px;font-size:13px;font-family:inherit;text-align:center;background:#fff}
    .qlog-save{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-family:inherit;font-weight:700;cursor:pointer}
    .qlog-cancel{background:none;border:none;color:#A09AB8;font-size:12px;font-family:inherit;cursor:pointer}

    /* Countdown banner */
    .countdown-card{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
    .cd-days{font-size:26px;font-weight:900;color:#92400E;line-height:1}
    .cd-unit{font-size:10px;color:#92400E;opacity:.75;font-weight:700}
    .cd-name{font-size:12px;font-weight:700;color:#78350F;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cd-date{font-size:10px;color:#A16207;margin-top:2px}
    .cd-icon{font-size:22px;flex-shrink:0}

    /* Log modal sections */
    .log-section{margin-bottom:14px}
    .log-section-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px}
    .task-chips{display:flex;flex-wrap:wrap;gap:6px}
    .task-chip{padding:6px 11px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all .1s}
    .task-chip.on{border-color:var(--primary);background:var(--pl);color:var(--primary)}
    .task-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .dur-row{display:flex;align-items:center;gap:10px}
    .dur-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--primary)}
    .dur-num{font-size:26px;font-weight:900;color:var(--text);min-width:52px;text-align:center}
    .dur-unit{font-size:12px;color:var(--muted)}

    /* Task list */
    .list{display:flex;flex-direction:column;gap:9px}
    .tcard{background:#fff;border-radius:var(--rs);padding:12px 13px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
    .cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .tname{font-size:13px;font-weight:700}
    .tmeta{font-size:10px;color:var(--muted);margin-top:3px}
    .pbadge{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:700;flex-shrink:0}
    .dbtn{background:none;border:none;color:#BDBDBD;font-size:18px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0}
    .dbtn:active{color:#EF5350}
    .ebtn{background:none;border:none;cursor:pointer;padding:3px;line-height:0;flex-shrink:0;opacity:.7;transition:opacity .15s}
    .ebtn:active{opacity:1}
    .check-box{width:22px;height:22px;border-radius:6px;border:2px solid #E0D7F7;background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
    .check-box.done{background:var(--primary);border-color:var(--primary);color:#fff}
    .tcard.done-card{opacity:.65}

    /* Stats screen */
    .stats-hero{background:var(--grad);border-radius:var(--r);padding:18px 18px 16px;color:#fff;margin-bottom:14px}
    .stats-hero-label{font-size:11px;opacity:.8;margin-bottom:2px}
    .stats-hero-row{display:flex;align-items:flex-end;gap:6px}
    .stats-hero-num{font-size:36px;font-weight:900;line-height:1}
    .stats-hero-unit{font-size:13px;opacity:.85;padding-bottom:5px}
    .stats-hero-sub{font-size:12px;opacity:.8;margin-top:5px}
    .stats-cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
    .stat-card{background:#fff;border-radius:var(--rs);padding:13px 14px;box-shadow:var(--shadow)}
    .stat-card-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
    .stat-card-val{font-size:22px;font-weight:900;color:var(--text)}
    .stat-card-label{font-size:10px;color:var(--muted);margin-top:2px}
    .section-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;margin-top:4px;letter-spacing:.05em}
    .cat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
    .cat-bar-label{font-size:11px;font-weight:700;width:48px;flex-shrink:0;color:var(--text)}
    .cat-bar-bg{flex:1;height:7px;background:#F0EEFF;border-radius:100px;overflow:hidden}
    .cat-bar-fill{height:100%;border-radius:100px;transition:width .4s}
    .cat-bar-count{font-size:10px;color:var(--muted);width:24px;text-align:right;flex-shrink:0}
    .done-list{display:flex;flex-direction:column;gap:6px}
    .done-item{background:#fff;border-radius:var(--rs);padding:10px 12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px}
    .done-item-date{font-size:10px;color:var(--muted);width:36px;flex-shrink:0}
    .done-item-name{font-size:12px;font-weight:700;flex:1;min-width:0}
    .done-item-dur{font-size:10px;color:var(--muted)}
    .dow-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
    .dow-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:700}

    /* FAB */
    .fab{position:fixed;bottom:72px;right:calc(50% - 226px);width:52px;height:52px;border-radius:50%;background:var(--grad);color:#fff;border:none;font-size:25px;cursor:pointer;box-shadow:0 4px 16px rgba(167,139,250,.35);display:flex;align-items:center;justify-content:center;z-index:200}
    @media(max-width:480px){.fab{right:14px}}
    .fab:active{transform:scale(.93)}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:300;display:flex;align-items:flex-end;animation:fi .18s}
    .modal{background:#fff;border-radius:22px 22px 0 0;padding:20px 16px 32px;width:100%;max-height:92dvh;overflow-y:auto;animation:su .28s cubic-bezier(.34,1.4,.64,1)}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .mtitle{font-size:16px;font-weight:900;color:var(--primary);margin-bottom:16px}
    .tab-row{display:flex;background:var(--bg);border-radius:var(--rs);padding:3px;margin-bottom:16px}
    .tabbtn{flex:1;padding:7px;border:none;background:none;border-radius:8px;font-family:inherit;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer}
    .tabbtn.on{background:#fff;color:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.1)}
    .fg{margin-bottom:13px}
    .fl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block}
    .fi{width:100%;border:2px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-family:inherit;font-size:14px;outline:none;color:var(--text)}
    .fi:focus{border-color:var(--primary)}
    .fi-sm{padding:8px 10px;font-size:13px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .hint{background:var(--pl);border-radius:8px;padding:8px 11px;margin-top:6px;font-size:11px;color:var(--primary)}
    .chips{display:flex;flex-wrap:wrap;gap:5px}
    .chip{padding:5px 10px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px}
    .chip.on{border-color:var(--primary);background:var(--pl);color:var(--primary)}
    .dow-chips{display:flex;gap:4px}
    .dow-chip{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
    .dow-chip.on{border-color:var(--primary);background:var(--primary);color:#fff}
    .dow-chip.sun.on{border-color:#F87171;background:#F87171}
    .dow-chip.sat.on{border-color:#60A5FA;background:#60A5FA}
    .btn-add{width:100%;background:var(--primary);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px}
    .btn-add:active{opacity:.9}
    .btn-cancel{width:100%;background:var(--bg);color:var(--muted);border:none;border-radius:var(--rs);padding:11px;font-size:13px;font-family:inherit;cursor:pointer;margin-top:6px}
    .empty{text-align:center;padding:44px 20px;color:var(--muted)}
    .empty-icon{font-size:42px;margin-bottom:10px}
    .empty-text{font-size:13px;line-height:1.9}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    /* ── WEEK VIEW ── */
    .week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .week-title{font-size:15px;font-weight:900;color:var(--text)}
    .week-rows{display:flex;flex-direction:column;gap:5px}
    .week-row{background:#fff;border-radius:var(--rs);padding:9px 11px;box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;cursor:pointer}
    .week-row:active{background:var(--pl)}
    .week-row.today-row{border:2px solid var(--primary)}
    .week-day{width:34px;flex-shrink:0}
    .week-dow{font-size:10px;font-weight:700;color:var(--muted)}
    .week-date{font-size:18px;font-weight:900;color:var(--text);line-height:1.1}
    .week-date.sun{color:#F87171}
    .week-date.sat{color:#60A5FA}
    .week-date.today-num{background:var(--primary);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px}
    .week-bar-wrap{flex:1;position:relative;height:18px;background:#F5F0FF;border-radius:4px;overflow:hidden}
    .week-bar-seg{position:absolute;top:0;height:100%;border-radius:2px}
    .week-free-badge{font-size:9px;font-weight:700;color:var(--muted);width:32px;text-align:right;flex-shrink:0}
    .week-event-dots{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap}
    .week-event-dot{width:5px;height:5px;border-radius:50%}

    /* ── CAL TOGGLE ── */
    .cal-toggle{display:flex;background:var(--bg);border-radius:var(--rs);padding:3px;margin-bottom:12px}
    .cal-toggle-btn{flex:1;padding:6px;border:none;background:none;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer}
    .cal-toggle-btn.on{background:#fff;color:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.1)}

    /* ── POMODORO MODAL ── */
    .pomo-task-row{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:var(--rs);padding:10px 13px;margin-bottom:18px}
    .pomo-task-name{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pomo-ring-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:18px}
    .pomo-time{font-size:42px;font-weight:900;color:var(--text);letter-spacing:-1px;margin-top:6px}
    .pomo-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .pomo-break-row{background:#FEF3C7;border-radius:var(--rs);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .pomo-break-time{font-size:18px;font-weight:900;color:#92400E}
    .pomo-btns{display:flex;gap:8px;margin-bottom:8px}
    .pomo-btn{flex:1;padding:12px 6px;border:none;border-radius:var(--rs);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
    .pomo-btn.primary{background:var(--primary);color:#fff}
    .pomo-btn.secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
    .pomo-btn.done{background:var(--grad);color:#fff}
    .pomo-btn.start-big{flex:unset;width:100%;padding:16px;font-size:16px;background:var(--grad);color:#fff;border-radius:var(--r)}
    .pomo-picker{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;max-height:200px;overflow-y:auto}
    .pomo-task-chip{background:#fff;border:1.5px solid var(--border);border-radius:var(--rs);padding:10px 13px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;text-align:left;display:flex;align-items:center;gap:8px}
    .pomo-task-chip.on{border-color:var(--primary);background:var(--pl);color:var(--primary)}
    .pomo-custom-input{margin-top:4px}

    /* ── CONFIRM DIALOG ── */
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;animation:fi .15s}

// ===== ALGORITHMS =====
function getFreeSlots(allBlocks){
  const normalized=allBlocks.map(b=>b.timeMode==='range'
    ?{...b,startTime:b.windowStart,endTime:b.windowStart+b.duration}:b);
  const sorted=[...normalized].sort((a,b)=>a.startTime-b.startTime);
  const slots=[];let cur=TS;
  for(const b of sorted){
    const s=Math.max(b.startTime,TS);
    if(s>cur)slots.push({start:cur,end:s,dur:s-cur});
    cur=Math.max(cur,Math.min(b.endTime,TE));
  }
  if(cur<TE)slots.push({start:cur,end:TE,dur:TE-cur});
  return slots.filter(s=>s.dur>=10);
}
function suggestFor(slot,tasks){
  const pm={morning:[360,720],afternoon:[720,1080],evening:[1080,1440],anytime:[360,1440]};
  const po={high:0,medium:1,low:2};
  return tasks
    .filter(t=>t.timeMode==='open'?slot.dur>=10:t.minDur<=slot.dur)
    .filter(t=>{const[a,b]=pm[t.pref]||[360,1440];return slot.start<b&&slot.end>a;})
    .sort((a,b)=>po[a.priority]-po[b.priority])
    .slice(0,4);
}

// ===== POMODORO MODAL =====
function PomodoroModal({onClose,onSave,tasks,dateStr,preTask}){
  const[selId,setSelId]=useState(preTask?.id??null);
  const[customName,setCustomName]=useState('');
  const[customCat,setCustomCat]=useState('勉強');
  const[phase,setPhase]=useState(preTask?'ready':'pick');
  const[elapsed,setElapsed]=useState(0);
  const[breakSec,setBreakSec]=useState(0);
  const timerRef=useRef(null);
  const breakRef=useRef(null);

  const selTask=tasks.find(t=>t.id===selId);
  const taskName=selTask?selTask.name:customName.trim()||'作業';
  const taskCat=selTask?selTask.category:customCat;
  const target=(selTask?selTask.maxDur:25)*60;

  const startWork=()=>{setPhase('running');timerRef.current=setInterval(()=>setElapsed(p=>p+1),1000);};
  const pauseWork=()=>{clearInterval(timerRef.current);setPhase('paused');};
  const resumeWork=()=>{setPhase('running');timerRef.current=setInterval(()=>setElapsed(p=>p+1),1000);};
  const startBreak=()=>{clearInterval(timerRef.current);setPhase('break');breakRef.current=setInterval(()=>setBreakSec(p=>p+1),1000);};
  const endBreak=()=>{clearInterval(breakRef.current);resumeWork();};
  const finish=()=>{
    clearInterval(timerRef.current);clearInterval(breakRef.current);
    const dur=Math.max(1,Math.round(elapsed/60));
    onSave({taskId:selId??null,name:taskName,duration:dur,category:taskCat,date:dateStr});
    onClose();
  };
  useEffect(()=>()=>{clearInterval(timerRef.current);clearInterval(breakRef.current);},[]);

  const fmtSec=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const R=52,C=2*Math.PI*R;
  const pct=Math.min(elapsed/target,1);

              <div className="chips">

            </div>

  return(

        <div className="pomo-task-row">
          <span style={{width:10,height:10,borderRadius:'50%',background:CAT[taskCat]||'#CBD5E1',display:'block',flexShrink:0}}/>
          <div className="pomo-task-name">{taskName}</div>
        </div>
        <div className="pomo-ring-wrap">
          <svg width="130" height="130" viewBox="0 0 130 130" style={{display:'block',margin:'0 auto'}}>
            <circle cx="65" cy="65" r={R} fill="none" stroke="var(--pl)" strokeWidth="10"/>
            <circle cx="65" cy="65" r={R} fill="none"
              stroke={phase==='break'?'#FDE68A':'var(--primary)'} strokeWidth="10"
              strokeDasharray={C} strokeDashoffset={C*(1-pct)} strokeLinecap="round"
              transform="rotate(-90 65 65)" style={{transition:'stroke-dashoffset .5s'}}/>
          </svg>
          <div className="pomo-time">{fmtSec(elapsed)}</div>
          <div className="pomo-sub">{phase==='running'?'集中':phase==='paused'?'一時停止':phase==='break'?'休憩':'準備OK'}</div>
        </div>
        {phase==='break'&&(
          <div className="pomo-break-row">
            <span style={{fontSize:12,color:'#92400E',fontWeight:700}}>休憩タイマー</span>
            <span className="pomo-break-time">{fmtSec(breakSec)}</span>
            <button className="pomo-btn secondary" style={{flex:'unset',padding:'6px 14px'}} onClick={endBreak}>作業に戻る</button>
          </div>
        )}
        {phase==='ready'&&<button className="pomo-btn start-big" onClick={startWork}>開始する</button>}
        {(phase==='running'||phase==='paused')&&(
          <div className="pomo-btns">
            {phase==='running'
              ?<button className="pomo-btn secondary" onClick={pauseWork}>一時停止</button>
              :<button className="pomo-btn primary" onClick={resumeWork}>再開する</button>}
            {phase==='running'&&<button className="pomo-btn secondary" onClick={startBreak}>休憩</button>}
            <button className="pomo-btn done" onClick={finish}>完了</button>
          </div>
        )}
        {phase==='break'&&(
          <div className="pomo-btns">
            <button className="pomo-btn done" onClick={finish}>完了として記録</button>
          </div>
        )}
        <button className="btn-cancel" onClick={()=>{clearInterval(timerRef.current);clearInterval(breakRef.current);onClose();}}>キャンセル</button>
      </div>
    </div>
  );
}

// ===== WEEK VIEW =====
function WeekView({data,skips,onSelectDate}){
  const[weekOffset,setWeekOffset]=useState(0);
  const baseMonday=useMemo(()=>{
    const d=new Date();d.setHours(0,0,0,0);
    const dow=d.getDay();
    d.setDate(d.getDate()-(dow===0?6:dow-1)+weekOffset*7);
    return d;
  },[weekOffset]);
  const days=useMemo(()=>Array.from({length:7},(_,i)=>{
    const d=new Date(baseMonday);d.setDate(d.getDate()+i);return d;
  }),[baseMonday]);
  const todayStr=today();
  const WLABEL=['月','火','水','木','金','土','日'];
  const D=18*60;
  const weekLabel=`${days[0].getMonth()+1}/${days[0].getDate()} 〜 ${days[6].getMonth()+1}/${days[6].getDate()}`;
  return(
    <div>
      <div className="week-nav">
        <button className="cal-nav-btn" onClick={()=>setWeekOffset(p=>p-1)}>‹</button>
        <span className="week-title">{weekLabel}</span>
        <button className="cal-nav-btn" onClick={()=>setWeekOffset(p=>p+1)}>›</button>
      </div>
      <div className="week-rows">
        {days.map((d,i)=>{
          const ds=toStr(d);const dow=d.getDay();const isToday=ds===todayStr;
          const dayFixed=data.fixedBlocks.filter(b=>{
            if(!(b.days||ALL_DAYS).includes(dow))return false;
            if((skips[ds]||[]).includes(b.id))return false;
            if(b.startDate&&ds<b.startDate)return false;
            if(b.endDate&&ds>b.endDate)return false;
            return true;
          });
          const dayEvents=data.events.filter(e=>e.date===ds);
          const allBlocks=[...dayFixed,...dayEvents];
          const freeMin=getFreeSlots(allBlocks).reduce((s,sl)=>s+sl.dur,0);
          const fh=Math.floor(freeMin/60),fm=freeMin%60;
          return(
            <div key={ds} className={`week-row${isToday?' today-row':''}`} onClick={()=>onSelectDate(ds)}>
              <div className="week-day">
                <div className="week-dow" style={{color:dow===0?'#F87171':dow===6?'#60A5FA':undefined}}>{WLABEL[i]}</div>
                <div className={`week-date${dow===0?' sun':dow===6?' sat':''}`}>
                  {isToday?<span className="week-date today-num">{d.getDate()}</span>:d.getDate()}
                </div>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div className="week-bar-wrap">
                  {allBlocks.filter(b=>b.startTime<1440&&b.endTime>360).map((b,j)=>{
                    const c=CAT[b.category]||'#BDBDBD';
                    const bS=b.timeMode==='range'?b.windowStart:b.startTime;
                    const bE=b.timeMode==='range'?b.windowEnd:b.endTime;
                    const l=((Math.max(bS,360)-360)/D)*100;
                    const w=((Math.min(bE,1440)-Math.max(bS,360))/D)*100;
                    return<div key={j} className="week-bar-seg" style={{left:`${l}%`,width:`${Math.max(w,.5)}%`,background:c,opacity:.8}}/>;
                  })}
                </div>
                {dayEvents.length>0&&<div className="week-event-dots">
                  {dayEvents.slice(0,6).map((e,j)=>(
                    <div key={j} className="week-event-dot" style={{background:CAT[e.category]||'#CBD5E1'}}/>
                  ))}
                </div>}
              </div>
              <div className="week-free-badge">{fh>0?`${fh}h`:''}{fm>0?`${fm}m`:freeMin===0?'─':''}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function MonthCalendar({events,onSelectDate,selectedDate}){
  const now=new Date();
  const[vm,setVm]=useState({y:now.getFullYear(),m:now.getMonth()});

  const grid=useMemo(()=>{
    const first=new Date(vm.y,vm.m,1);
    const last=new Date(vm.y,vm.m+1,0);
    const dow=first.getDay();
    const cells=[];
    for(let i=dow-1;i>=0;i--){
      const d=new Date(vm.y,vm.m,0-i);cells.push({d,cur:false});
    }
    for(let i=1;i<=last.getDate();i++){
      cells.push({d:new Date(vm.y,vm.m,i),cur:true});
    }
    while(cells.length<42){
      const d=new Date(vm.y,vm.m+1,cells.length-dow-last.getDate()+1);
      cells.push({d,cur:false});
    }
    return cells;
  },[vm]);

  const eventsByDate=useMemo(()=>{
    const m={};
    for(const e of events){
      if(!m[e.date])m[e.date]=[];
      m[e.date].push(e);
    }
    return m;
  },[events]);

  const todayStr=today();

  const prev=()=>setVm(v=>v.m===0?{y:v.y-1,m:11}:{y:v.y,m:v.m-1});
  const next=()=>setVm(v=>v.m===11?{y:v.y+1,m:0}:{y:v.y,m:v.m+1});

  return(
    <div>
      <div className="cal-nav">
        <button className="cal-nav-btn" onClick={prev}>‹</button>
        <span className="cal-month">{vm.y}年{vm.m+1}月</span>
        <button className="cal-nav-btn" onClick={next}>›</button>
      </div>
      <div className="cal-dow">
        {DOW.map(d=><div key={d} className="cal-dow-cell">{d}</div>)}
      </div>
      <div className="cal-grid">
        {grid.map(({d,cur},i)=>{
          const ds=toStr(d);
          const dow=d.getDay();
          const isToday=ds===todayStr;
          const isSel=ds===selectedDate;
          const evs=eventsByDate[ds]||[];
          return(
            <div key={i}
              className={`cal-cell${!cur?' other':''}${isToday?' today':''}${isSel&&!isToday?' selected':''}`}
              onClick={()=>cur&&onSelectDate(ds)}
            >
              <div className={`cal-num${dow===0?' sun':dow===6?' sat':''}`}>{d.getDate()}</div>
              {evs.slice(0,2).map((e,j)=>{
                const c=CAT[e.category]||'#BDBDBD';
                return(
                  <div key={j} className="cal-ev" style={{background:c+'25',color:c}}>
                    {e.name}
                  </div>
                );
              })}
              {evs.length>2&&<div className="cal-more">+{evs.length-2}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ===== DAY VIEW =====
function DayView({dateStr,data,onBack,onAddEvent,onOpenPomodoro,onDelEvent,skips,onToggleSkip}){
  const d=new Date(dateStr+'T00:00:00');
  const dow=d.getDay();
  const isToday=dateStr===today();
  const label=`${d.getMonth()+1}月${d.getDate()}日（${DOW[dow]}）`;
  const daySkips=skips[dateStr]||[];

  // Blocks for this day (apply skips + date range)
  const dayFixed=data.fixedBlocks.filter(b=>{
    if(!(b.days||ALL_DAYS).includes(dow))return false;
    if(daySkips.includes(b.id))return false;
    if(b.startDate&&dateStr<b.startDate)return false;
    if(b.endDate&&dateStr>b.endDate)return false;
    return true;
  });
  const dayFixedAll=data.fixedBlocks.filter(b=>(b.days||ALL_DAYS).includes(dow));
  const dayEvents=data.events.filter(e=>e.date===dateStr);
  const normFixed=b=>b.timeMode==='range'?{...b,startTime:b.windowStart,endTime:b.windowStart+b.duration}:b;
  const allBlocks=[
    ...dayFixed.map(b=>({...normFixed(b),isFixed:true})),
    ...dayEvents.map(e=>({...e,isEvent:true})),
  ];
  const slots=getFreeSlots(allBlocks);
  const totalFree=slots.reduce((s,sl)=>s+sl.dur,0);
  const fh=Math.floor(totalFree/60),fm=totalFree%60;
  const hours=Array.from({length:19},(_,i)=>i+6);

  // Current time line
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const showNow=isToday&&nowMin>=TS&&nowMin<TE;

  return(
    <div>
      <div className="day-header">
        {onBack&&<button className="back-btn" onClick={onBack}>‹</button>}
        <span className="day-title">{label}</span>
        <span className="day-badge">{fh>0?`${fh}h`:''}{fm>0?`${fm}m`:totalFree===0?'空きなし':''} 空き</span>
      </div>

      <CountdownBanner events={data.events}/>
      <div className="summary-card">
        <div className="sum-label">この日の空き時間</div>
        <div className="sum-val">
          {fh>0?`${fh}時間`:''}{fm>0?`${fm}分`:''}
          <span className="sum-sub">{totalFree===0?'予定がぎっしり！':'自由に使えます'}</span>
        </div>
        <div className="slot-chips">
          {slots.map((s,i)=>(
            <span key={i} className="slot-chip">{fmt(s.start)}〜{fmt(s.end)}</span>
          ))}
          {slots.length===0&&<span className="slot-chip">空き時間なし</span>}
        </div>
      </div>

      {/* Recommendation card */}
      {(()=>{
        const PC={high:'#F9A8D4',medium:'#FDE68A',low:'#86EFAC'};
        const allSlots=slots.filter(s=>s.dur>=20);
        if(!allSlots.length||!data.tasks.length)return null;
        const bigSlot=allSlots.reduce((a,b)=>b.dur>a.dur?b:a,allSlots[0]);
        const recs=suggestFor(bigSlot,data.tasks).slice(0,3);
        if(!recs.length)return null;
        return(
          <div className="rec-card">
            <div className="rec-title">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 1L9.8 5.5H14.5L10.6 8.4L12 13L8 10.2L4 13L5.4 8.4L1.5 5.5H6.2L8 1Z" fill="var(--primary)" opacity="0.85"/></svg>
              このスキマ時間に試してみませんか？
              <span style={{marginLeft:'auto',fontSize:10,color:'#A09AB8',fontWeight:600}}>{fmt(bigSlot.start)}〜{fmt(bigSlot.end)}（{bigSlot.dur}分）</span>
            </div>
            {recs.map(t=>(
              <button key={t.id} className="rec-item" onClick={()=>onOpenPomodoro(t)}>
                <span style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:PC[t.priority]||'#E0E0E0',flexShrink:0,display:'inline-block'}}/>
                  <span style={{fontWeight:700,color:'#374151'}}>{t.name}</span>
                </span>
                <span className="rec-dur">{t.timeMode==='open'?'コツコツ型':`${t.minDur}〜${t.maxDur}分`}</span>
              </button>
            ))}
          </div>
        );
      })()}

      {/* Add event button */}
      <button onClick={onAddEvent} style={{
        width:'100%',background:'#fff',border:'2px dashed var(--border)',
        borderRadius:'var(--rs)',padding:'10px',fontSize:'13px',
        color:'var(--muted)',cursor:'pointer',marginBottom:'14px',fontFamily:'inherit'
      }}>＋ この日に予定を追加</button>

      {/* Timeline */}
      <div className="tl-wrap">
        <div className="tl-hours" style={{height:TH+20,position:'relative',paddingTop:20}}>
          {hours.map(h=>(
            <div key={h} className="tl-hlabel" style={{top:t2px(h*60)+20}}>
              {h<24?`${h}:00`:''}
            </div>
          ))}
        </div>
        <div className="tl-events" style={{height:TH+20,marginTop:20}}>
          {hours.map(h=>(
            <div key={h} className={`tl-hline${h%3===0?' maj':''}`} style={{top:t2px(h*60)}}/>
          ))}
          {showNow&&<div className="tl-now" style={{top:t2px(nowMin)}}/>}

          {/* 左トラック：時刻固定の予定・空き時間 */}
          <div className="tl-main">
            {slots.map((sl,i)=>{
              const ht=(sl.dur/60)*PH;
              if(ht<14)return null;
              const sugs=suggestFor(sl,data.tasks);
              return(
                <div key={i} className="free-slot" style={{top:t2px(sl.start),height:Math.max(ht,18)}}>
                  {ht>=22&&<div className="free-label" style={{display:'flex',alignItems:'center',gap:3}}><IcoSparkle s={9}/>空き {sl.dur}分</div>}
                  {ht>=42&&sugs.length>0&&(
                    <div className="free-sugs">
                      {sugs.map(t=>{
                        const pc={high:'#F9A8D4',medium:'#FDE68A',low:'#86EFAC'};
                        const c=pc[t.priority]||'#E0E0E0';
                        return(
                          <button key={t.id} className="free-chip" style={{background:c+'30',borderColor:c,color:'inherit'}} onClick={()=>onOpenPomodoro(t)}>{t.name}</button>
                        );
                      })}
                    </div>
                  )}
                  {ht>=52&&<button className="free-log-btn" onClick={()=>onOpenPomodoro(null)}>＋ タイマー開始</button>}
                </div>
              );
            })}
            {dayFixed.filter(b=>b.timeMode!=='range').map(b=>{
              const c=CAT[b.category]||'#BDBDBD';
              if(b.endTime<=TS||b.startTime>=TE)return null;
              const s=Math.max(b.startTime,TS),e=Math.min(b.endTime,TE);
              const ht=((e-s)/60)*PH;
              return(
                <div key={b.id} className="block" style={{top:t2px(s),height:Math.max(ht,20),background:c+'22',border:`2px solid ${c}`,borderLeft:`4px solid ${c}`}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
                    <div className="block-name" style={{color:'#2D2D3A'}}>{b.name}</div>
                    {ht>=24&&<button className="skip-btn" onClick={()=>onToggleSkip(dateStr,b.id)} title="この日はスキップ">✕</button>}
                  </div>
                  {ht>=32&&<div className="block-time" style={{color:'#6B6B80'}}>{fmt(b.startTime)}〜{fmt(b.endTime)}</div>}
                </div>
              );
            })}
          </div>

          {/* 右トラック：時間帯（フレキシブル）予定 */}
          <div className="tl-flex">
            <div className="tl-flex-label">時間帯</div>
            {dayFixed.filter(b=>b.timeMode==='range').map(b=>{
              const c=CAT[b.category]||'#BDBDBD';
              if(b.windowEnd<=TS||b.windowStart>=TE)return null;
              const s=Math.max(b.windowStart,TS),e=Math.min(b.windowEnd,TE);
              const ht=((e-s)/60)*PH;
              return(
                <div key={b.id} className="flex-block" style={{top:t2px(s),height:Math.max(ht,22),background:c+'18',borderColor:c}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
                    <div className="flex-block-name" style={{color:'#2D2D3A'}}>{b.name}</div>
                    <button className="skip-btn" onClick={()=>onToggleSkip(dateStr,b.id)} title="この日はスキップ" style={{fontSize:9,padding:'1px 3px'}}>✕</button>
                  </div>
                  {ht>=36&&<div className="flex-block-dur" style={{color:'#6B6B80'}}>〜{b.duration}分</div>}
                </div>
              );
            })}
          </div>

          {/* One-time events */}
          {dayEvents.filter(e=>e.endTime>TS&&e.startTime<TE).map(e=>{
            const c=CAT[e.category]||'#BDBDBD';
            const s=Math.max(e.startTime,TS),en=Math.min(e.endTime,TE);
            const ht=((en-s)/60)*PH;
            return(
              <div key={e.id} className="block" style={{
                top:t2px(s),height:Math.max(ht,20),
                background:c+'44',border:`2px solid ${c}`,
                borderStyle:'solid',borderLeftWidth:'4px',
              }}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
                  <div className="block-name" style={{color:'#2D2D3A',display:'flex',alignItems:'center',gap:3}}><IcoPin c={c} s={11}/>{e.name}</div>
                  <button onClick={()=>onDelEvent(e.id)} style={{
                    background:'none',border:'none',color:'#9090A8',opacity:.9,cursor:'pointer',
                    fontSize:'13px',lineHeight:1,padding:'0 0 0 4px',flexShrink:0
                  }}>×</button>
                </div>
                {ht>=32&&<div className="block-time" style={{color:'#6B6B80'}}>{fmt(e.startTime)}〜{fmt(e.endTime)}</div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function TasksScreen({tasks,onDel,onEdit,completions,onToggle,onPomodoro,onLog}){
  const PI={high:<IcoPrioHigh s={11}/>,medium:<IcoPrioMed s={11}/>,low:<IcoPrioLow s={11}/>};
  const PL={high:'高',medium:'中',low:'低'};
  const PC={high:'#F9A8D4',medium:'#FDE68A',low:'#86EFAC'};
  const FL={daily:'毎日',weekly:'週1〜',once:'1回'};
  const TL={morning:'朝',afternoon:'昼',evening:'夜',anytime:'いつでも'};
  const todayStr=today();
  const doneIds=completions[todayStr]||[];
  const[confirm,setConfirm]=useState(null);
  const[qlogTask,setQlogTask]=useState(null); // task being quick-logged
  const[qlogMin,setQlogMin]=useState('');
  const saveQlog=()=>{
    const m=parseInt(qlogMin,10);
    if(isNaN(m)||m<=0){setQlogTask(null);setQlogMin('');return;}
    onLog({type:'task',name:qlogTask.name,taskId:qlogTask.id,duration:m,date:todayStr,note:''});
    setQlogTask(null);setQlogMin('');
  };
  const dlDays=dl=>{if(!dl)return null;const d=new Date(dl+'T00:00:00');const n=new Date();n.setHours(0,0,0,0);return Math.round((d-n)/86400000);};
  const total=tasks.length;
  const done=doneIds.length;
  const pct=total>0?done/total:0;
  const R=28;const circ=2*Math.PI*R;
  const MoveRing=(
    <div className="move-ring-wrap">
      <svg width="70" height="70" viewBox="0 0 70 70">
        <circle cx="35" cy="35" r={R} fill="none" stroke="var(--pl)" strokeWidth="9"/>
        <circle cx="35" cy="35" r={R} fill="none" stroke="var(--primary)" strokeWidth="9"
          strokeDasharray={`${circ*pct} ${circ}`} strokeLinecap="round"
          transform="rotate(-90 35 35)" style={{transition:'stroke-dasharray 0.4s'}}/>
        <text x="35" y="39" textAnchor="middle" fontSize="13" fontWeight="900" fill="var(--primary)">{done}/{total}</text>
      </svg>
      <div className="move-ring-info">
        <div className="move-ring-label">今日の達成</div>
        <div className="move-ring-count">{total>0?Math.round(pct*100):0}%</div>
        <div style={{fontSize:11,color:'#A09AB8'}}>{done}件完了 / {total}件</div>
      </div>
    </div>
  );
  if(!tasks.length)return(
    <div className="empty"><div className="empty-icon"><EmptyIllustTasks/></div>
    <div className="empty-text">タスクがまだありません。<br/>＋ボタンから追加してみよう！</div></div>
  );
  return(
    <>
      {confirm&&<ConfirmDialog title="タスクを削除" msg={`「${confirm.name}」を削除しますか？`} onOk={()=>{onDel(confirm.id);setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
      {MoveRing}
      {qlogTask&&(
        <div className="qlog-row">
          <span style={{fontSize:12,fontWeight:700,color:'var(--primary)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{qlogTask.name}</span>
          <input className="qlog-input" type="text" inputMode="numeric" pattern="[0-9]*" placeholder="分" value={qlogMin} onChange={e=>setQlogMin(e.target.value.replace(/[^0-9]/g,''))} autoFocus onKeyDown={e=>{if(e.key==='Enter')saveQlog();if(e.key==='Escape'){setQlogTask(null);setQlogMin('');}}}/>
          <span style={{fontSize:11,color:'#A09AB8'}}>分やった</span>
          <button className="qlog-save" onClick={saveQlog}>記録</button>
          <button className="qlog-cancel" onClick={()=>{setQlogTask(null);setQlogMin('');}}>✕</button>
        </div>
      )}
      <div className="list">
        {[...tasks].sort((a,b)=>{
          if(a.deadline&&b.deadline)return a.deadline.localeCompare(b.deadline);
          if(a.deadline)return -1;
          if(b.deadline)return 1;
          return 0;
        }).map(t=>{
          const done=doneIds.includes(t.id);
          const dl=dlDays(t.deadline);
          const soon=dl!==null&&dl<=3;
          return(
            <div className={`tcard${done?' done-card':''}`} key={t.id}>
              <button className={`check-box${done?' done':''}`} onClick={()=>onToggle(t.id,todayStr)}>{done?'✓':''}</button>
              <div className="cdot" style={{background:CAT[t.category]||'#BDBDBD'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div className="tname" style={done?{textDecoration:'line-through',opacity:.6}:{}}>{t.name}</div>
                <div className="tmeta"><IcoTimerSvg c="var(--primary-mid)" s={11}/> {t.timeMode==='open'?'コツコツ型':fmtDur(t.minDur,t.maxDur)} · {FL[t.freq]} · {TL[t.pref]}</div>
                {t.deadline&&<span className={`deadline-badge${soon?' soon':''}`}><IcoClock s={9}/>{dl===0?'今日まで':dl<0?`${-dl}日超過`:`あと${dl}日`}</span>}
              </div>
              <span className="pbadge" style={{background:PC[t.priority]+'20',color:PC[t.priority],display:'flex',alignItems:'center',gap:3}}>{PI[t.priority]}{PL[t.priority]}</span>
              <button className="ebtn" title="時間を記録" onClick={()=>{setQlogTask(t);setQlogMin('');}}>
                <svg width={26} height={26} viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="9" fill="var(--pl)"/><circle cx="16" cy="17" r="7" fill="none" stroke="var(--primary)" strokeWidth="1.5"/><path d="M16 13v4l3 2" stroke="var(--primary)" strokeWidth="1.5" strokeLinecap="round"/><path d="M13 5h6M16 5v3" stroke="var(--primary-mid)" strokeWidth="1.5" strokeLinecap="round"/></svg>
              </button>
              <button className="ebtn" title="開始" onClick={()=>onPomodoro(t)}>
                <svg width={26} height={26} viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="9" fill="var(--pl)"/><circle cx="16" cy="16" r="7" fill="var(--primary-mid)" stroke="var(--primary)" strokeWidth="1.5" opacity="0.6"/><path d="M14 13l6 3-6 3V13z" fill="var(--primary)"/></svg>
              </button>
              <button className="ebtn" onClick={()=>onEdit(t)}><PencilIcon size={26}/></button>
              <button className="dbtn" onClick={()=>setConfirm(t)}>×</button>
            </div>
          );
        })}
      </div>
    </>
  );
}

// ===== FIXED SCREEN =====
function FixedScreen({blocks,onDel,onEdit}){
  const[confirm,setConfirm]=useState(null);
  if(!blocks.length)return(
    <div className="empty"><div className="empty-icon"><EmptyIllustFixed/></div>
    <div className="empty-text">固定予定がありません。<br/>＋ボタンから追加してみよう！</div></div>
  );
  return(
    <>
      {confirm&&<ConfirmDialog title="固定予定を削除" msg={`「${confirm.name}」を削除しますか？`} onOk={()=>{onDel(confirm.id);setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
      <div className="list">
        {[...blocks].sort((a,b)=>a.startTime-b.startTime).map(b=>{
          const days=b.days||ALL_DAYS;
          return(
            <div className="tcard" key={b.id}>
              <div className="cdot" style={{background:CAT[b.category]||'#BDBDBD'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div className="tname">{b.name}</div>
                <div className="tmeta">{b.timeMode==='range'?`${fmt(b.windowStart)}〜${fmt(b.windowEnd)}の間の${b.duration}分`:`${fmt(b.startTime)}〜${fmt(b.endTime)}（${b.endTime-b.startTime}分）`}</div>
                <div className="dow-badges">
                  {DOW.map((d,i)=>(
                    <span key={i} className="dow-badge" style={{
                      background:days.includes(i)?(i===0?'#FEE2E2':i===6?'#DBEAFE':'var(--pl)'):'#F5F5F7',
                      color:days.includes(i)?(i===0?'#F87171':i===6?'#60A5FA':'var(--primary)'):'#CBD5E1',
                    }}>{d}</span>
                  ))}
                </div>
                {(b.startDate||b.endDate)&&<div className="date-range-tag"><IcoClock s={9}/>{b.startDate||'〜'}〜{b.endDate||'制限なし'}</div>}
              </div>
              <button className="ebtn" onClick={()=>onEdit(b)}><PencilIcon size={26}/></button>
              <button className="dbtn" onClick={()=>setConfirm(b)}>×</button>
            </div>
          );
        })}
      </div>
    </>
  );
}

// ===== ADD MODAL =====
function AddModal({onClose,onAdd,onUpdate,defaultMode='task',defaultDate='',editItem=null}){
  const isEdit=!!editItem;
  const[mode,setMode]=useState(defaultMode);

  // Task
  const[name,setName]=useState(isEdit&&mode==='task'?editItem.name:'');
  const[taskTimeMode,setTaskTimeMode]=useState(isEdit&&mode==='task'?(editItem.timeMode||'timed'):'timed');
  const[minD,setMinD]=useState(isEdit&&mode==='task'?editItem.minDur:30);
  const[maxD,setMaxD]=useState(isEdit&&mode==='task'?editItem.maxDur:30);
  const[pri,setPri]=useState(isEdit&&mode==='task'?editItem.priority:'medium');
  const[freq,setFreq]=useState(isEdit&&mode==='task'?editItem.freq:'daily');
  const[pref,setPref]=useState(isEdit&&mode==='task'?editItem.pref:'anytime');
  const[cat,setCat]=useState(isEdit&&mode==='task'?editItem.category:'その他');
  const[sug,setSug]=useState(null);
  const[deadline,setDeadline]=useState(isEdit&&mode==='task'?(editItem.deadline||''):'');

  // Fixed
  const[fname,setFname]=useState(isEdit&&mode==='fixed'?editItem.name:'');
  const[ftimeMode,setFtimeMode]=useState(isEdit&&mode==='fixed'?(editItem.timeMode||'exact'):'exact');
  const[fst,setFst]=useState(isEdit&&mode==='fixed'&&editItem.timeMode!=='range'?fmt(editItem.startTime):'09:00');
  const[fen,setFen]=useState(isEdit&&mode==='fixed'&&editItem.timeMode!=='range'?fmt(editItem.endTime):'10:00');
  const[fwinStart,setFwinStart]=useState(isEdit&&mode==='fixed'&&editItem.timeMode==='range'?fmt(editItem.windowStart):'08:00');
  const[fwinEnd,setFwinEnd]=useState(isEdit&&mode==='fixed'&&editItem.timeMode==='range'?fmt(editItem.windowEnd):'10:00');
  const[fDuration,setFDuration]=useState(isEdit&&mode==='fixed'&&editItem.timeMode==='range'?String(editItem.duration):'30');
  const[fcat,setFcat]=useState(isEdit&&mode==='fixed'?editItem.category:'その他');
  const[fdays,setFdays]=useState(isEdit&&mode==='fixed'?(editItem.days||[...WEEKDAYS]):[...WEEKDAYS]);
  const[fStartDate,setFStartDate]=useState(isEdit&&mode==='fixed'?(editItem.startDate||''):'');
  const[fEndDate,setFEndDate]=useState(isEdit&&mode==='fixed'?(editItem.endDate||''):'');

  // Event
  const[ename,setEname]=useState(isEdit&&mode==='event'?editItem.name:'');
  const[edate,setEdate]=useState(isEdit&&mode==='event'?editItem.date:(defaultDate||today()));
  const[est,setEst]=useState(isEdit&&mode==='event'?fmt(editItem.startTime):'10:00');
  const[een,setEen]=useState(isEdit&&mode==='event'?fmt(editItem.endTime):'11:00');
  const[ecat,setEcat]=useState(isEdit&&mode==='event'?editItem.category:'その他');
  const[enote,setEnote]=useState(isEdit&&mode==='event'?(editItem.note||''):'');

  const onNameCh=e=>{
    const v=e.target.value;setName(v);
    const s=getSug(v);if(s){setSug(s);setMinD(s.min);setMaxD(s.max);setCat(s.cat);}else setSug(null);
  };
  const onFnameCh=e=>{const v=e.target.value;setFname(v);const s=getSug(v);if(s)setFcat(s.cat);};

  const toggleDay=i=>setFdays(prev=>prev.includes(i)?prev.filter(d=>d!==i):[...prev,i]);

  const submit=()=>{
    if(mode==='task'){
      if(!name.trim())return;
      const payload={type:'task',name:name.trim(),timeMode:taskTimeMode,minDur:taskTimeMode==='open'?0:minD,maxDur:taskTimeMode==='open'?0:maxD,priority:pri,freq,pref,category:cat,deadline:deadline||null};
      isEdit?onUpdate({...payload,id:editItem.id}):onAdd(payload);
    }else if(mode==='fixed'){
      if(!fname.trim())return;
      const s=parse(fst),e=parse(fen);if(e<=s)return;
      let payload;
      if(ftimeMode==='range'){
        const ws=parse(fwinStart),we=parse(fwinEnd),dur=parseInt(fDuration)||30;
        payload={type:'fixed',name:fname.trim(),timeMode:'range',windowStart:ws,windowEnd:we,duration:dur,category:fcat,days:fdays,startDate:fStartDate||null,endDate:fEndDate||null};
      }else{
        payload={type:'fixed',name:fname.trim(),startTime:s,endTime:e,category:fcat,days:fdays,startDate:fStartDate||null,endDate:fEndDate||null};
      }
      isEdit?onUpdate({...payload,id:editItem.id}):onAdd(payload);
    }else{
      if(!ename.trim())return;
      const s=parse(est),e=parse(een);if(e<=s)return;
      const payload={type:'event',name:ename.trim(),date:edate,startTime:s,endTime:e,category:ecat,note:enote};
      isEdit?onUpdate({...payload,id:editItem.id}):onAdd(payload);
    }
    onClose();
  };

  const Chip=({v,cur,set,label,style})=>(
    <button className={`chip${cur===v?' on':''}`} style={style} onClick={()=>set(v)}>{label}</button>
  );

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="mtitle" style={{display:'flex',alignItems:'center',gap:7}}>{isEdit?<><PencilIcon size={22}/>編集する</>:<><IcoMagic s={20}/>追加する</>}</div>
        {!isEdit&&(
          <div className="tab-row">
            <button className={`tabbtn${mode==='task'?' on':''}`} onClick={()=>setMode('task')}>タスク・習慣</button>
            <button className={`tabbtn${mode==='fixed'?' on':''}`} onClick={()=>setMode('fixed')}>固定予定</button>
            <button className={`tabbtn${mode==='event'?' on':''}`} onClick={()=>setMode('event')}>その日の予定</button>
          </div>
        )}

        {mode==='task'&&(
          <>
            <div className="fg">
              <label className="fl">タスク名</label>
              <input className="fi" placeholder="例：英語の勉強、メイク、お風呂…" value={name} onChange={onNameCh}/>
              {sug&&<div className="hint" style={{display:'flex',alignItems:'center',gap:5}}><IcoLamp s={14}/><span><strong>{sug.min}〜{sug.max}分</strong> くらいかな？ カテゴリ: {sug.cat}</span></div>}
            </div>
            <div className="fg">
              <label className="fl">かかる時間</label>
              <div style={{display:'flex',gap:8,marginTop:4}}>
                <button type="button" onClick={()=>setTaskTimeMode('timed')} style={{
                  flex:1,padding:'8px 4px',border:'1.5px solid',borderRadius:10,fontSize:12,fontFamily:'inherit',cursor:'pointer',fontWeight:700,
                  borderColor:taskTimeMode==='timed'?'var(--primary)':'var(--border)',
                  background:taskTimeMode==='timed'?'var(--pl)':'#fff',
                  color:taskTimeMode==='timed'?'var(--primary)':'#A09AB8',
                }}>◉ 時間指定タスク</button>
                <button type="button" onClick={()=>setTaskTimeMode('open')} style={{
                  flex:1,padding:'8px 4px',border:'1.5px solid',borderRadius:10,fontSize:12,fontFamily:'inherit',cursor:'pointer',fontWeight:700,
                  borderColor:taskTimeMode==='open'?'var(--primary)':'var(--border)',
                  background:taskTimeMode==='open'?'var(--pl)':'#fff',
                  color:taskTimeMode==='open'?'var(--primary)':'#A09AB8',
                }}>○ 時間を決めない<br/><span style={{fontSize:10,fontWeight:400}}>（コツコツ型）</span></button>
              </div>
              {taskTimeMode==='timed'&&(
                <div className="form-row" style={{marginTop:8}}>
                  <div className="fg"><label className="fl">最短（分）</label>
                    <input className="fi fi-sm" type="number" min="1" max="480" value={minD} onChange={e=>setMinD(+e.target.value)}/></div>
                  <div className="fg"><label className="fl">最長（分）</label>
                    <input className="fi fi-sm" type="number" min="1" max="480" value={maxD} onChange={e=>setMaxD(+e.target.value)}/></div>
                </div>
              )}
            </div>
            <div className="fg"><label className="fl">優先度</label><div className="chips">
              {[['high',<><IcoPrioHigh s={12}/>高</>],['medium',<><IcoPrioMed s={12}/>中</>],['low',<><IcoPrioLow s={12}/>低</>]].map(([v,l])=>(
                <Chip key={v} v={v} cur={pri} set={setPri} label={l}/>))}</div></div>
            <div className="fg"><label className="fl">頻度</label><div className="chips">
              {[['daily','毎日'],['weekly','週1〜'],['once','1回だけ']].map(([v,l])=>(
                <Chip key={v} v={v} cur={freq} set={setFreq} label={l}/>))}</div></div>
            <div className="fg"><label className="fl">やりたい時間帯</label><div className="chips">
              {[['morning',<><IcoSunRise s={13}/>朝</>],['afternoon',<><IcoSunFull s={13}/>昼</>],['evening',<><IcoMoon s={13}/>夜</>],['anytime',<><IcoClock s={13}/>いつでも</>]].map(([v,l])=>(
                <Chip key={v} v={v} cur={pref} set={setPref} label={l}/>))}</div></div>
            <div className="fg"><label className="fl">カテゴリ</label><div className="chips">
              {CATS.map(c=><Chip key={c} v={c} cur={cat} set={setCat} label={c}
                style={cat===c?{borderColor:CAT[c],background:CAT[c]+'22',color:CAT[c]}:{}}/>)}</div></div>
            <div className="fg">
              <label className="fl">締め切り（任意）</label>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <input className="fi fi-sm" type="date" value={deadline} onChange={e=>setDeadline(e.target.value)} style={{flex:1}}/>
                {deadline&&<button className="btn-cancel" style={{padding:'6px 10px',margin:0,fontSize:11}} onClick={()=>setDeadline('')}>クリア</button>}
              </div>
            </div>
          </>
        )}

        {mode==='fixed'&&(
          <>
            <div className="fg">
              <label className="fl">予定名</label>
              <input className="fi" placeholder="例：授業、通学、バイト…" value={fname} onChange={onFnameCh}/>
            </div>
            <div className="fg">
              <label className="fl">時間の設定方法</label>
              <div style={{display:'flex',gap:8,marginTop:4}}>
                <button type="button" onClick={()=>setFtimeMode('exact')} style={{
                  flex:1,padding:'8px 4px',border:'1.5px solid',borderRadius:10,fontSize:12,fontFamily:'inherit',cursor:'pointer',fontWeight:700,
                  borderColor:ftimeMode==='exact'?'var(--primary)':'var(--border)',
                  background:ftimeMode==='exact'?'var(--pl)':'#fff',
                  color:ftimeMode==='exact'?'var(--primary)':'#A09AB8',
                }}>⏰ 時刻固定<br/><span style={{fontSize:10,fontWeight:400}}>何時〜何時</span></button>
                <button type="button" onClick={()=>setFtimeMode('range')} style={{
                  flex:1,padding:'8px 4px',border:'1.5px solid',borderRadius:10,fontSize:12,fontFamily:'inherit',cursor:'pointer',fontWeight:700,
                  borderColor:ftimeMode==='range'?'var(--primary)':'var(--border)',
                  background:ftimeMode==='range'?'var(--pl)':'#fff',
                  color:ftimeMode==='range'?'var(--primary)':'#A09AB8',
                }}>🕐 時間帯指定<br/><span style={{fontSize:10,fontWeight:400}}>〇時〜△時の間に何分</span></button>
              </div>
            </div>
            {ftimeMode==='exact'?(
              <div className="form-row">
                <div className="fg"><label className="fl">開始時刻</label>
                  <input className="fi fi-sm" type="time" value={fst} onChange={e=>setFst(e.target.value)}/></div>
                <div className="fg"><label className="fl">終了時刻</label>
                  <input className="fi fi-sm" type="time" value={fen} onChange={e=>setFen(e.target.value)}/></div>
              </div>
            ):(
              <>
                <div className="form-row">
                  <div className="fg"><label className="fl">時間帯・開始</label>
                    <input className="fi fi-sm" type="time" value={fwinStart} onChange={e=>setFwinStart(e.target.value)}/></div>
                  <div className="fg"><label className="fl">時間帯・終了</label>
                    <input className="fi fi-sm" type="time" value={fwinEnd} onChange={e=>setFwinEnd(e.target.value)}/></div>
                </div>
                <div className="fg">
                  <label className="fl">所要時間（分）</label>
                  <input className="fi fi-sm" type="number" min="1" max="480" placeholder="30" value={fDuration} onChange={e=>setFDuration(e.target.value)}/>
                </div>
              </>
            )}
            <div className="fg">
              <label className="fl">繰り返す曜日</label>
              <div className="dow-chips">
                {DOW.map((d,i)=>(
                  <button key={i}
                    className={`dow-chip${fdays.includes(i)?' on':''}${i===0?' sun':i===6?' sat':''}`}
                    onClick={()=>toggleDay(i)}>{d}</button>
                ))}
              </div>
            </div>
            <div className="fg"><label className="fl">カテゴリ</label><div className="chips">
              {CATS.map(c=><Chip key={c} v={c} cur={fcat} set={setFcat} label={c}
                style={fcat===c?{borderColor:CAT[c],background:CAT[c]+'22',color:CAT[c]}:{}}/>)}</div></div>
            <div className="fg">
              <label className="fl">有効期間（任意・期限なしはそのまま）</label>
              <div className="form-row">
                <div className="fg"><label className="fl">開始日</label>
                  <input className="fi fi-sm" type="date" value={fStartDate} onChange={e=>setFStartDate(e.target.value)}/></div>
                <div className="fg"><label className="fl">終了日</label>
                  <input className="fi fi-sm" type="date" value={fEndDate} onChange={e=>setFEndDate(e.target.value)}/></div>
              </div>
            </div>
          </>
        )}

        {mode==='event'&&(
          <>
            <div className="fg">
              <label className="fl">予定名</label>
              <input className="fi" placeholder="例：病院、友達と映画、ゼミ発表…" value={ename} onChange={e=>setEname(e.target.value)}/>
            </div>
            <div className="fg">
              <label className="fl">日付</label>
              <input className="fi fi-sm" type="date" value={edate} onChange={e=>setEdate(e.target.value)}/>
            </div>
            <div className="form-row">
              <div className="fg"><label className="fl">開始時刻</label>
                <input className="fi fi-sm" type="time" value={est} onChange={e=>setEst(e.target.value)}/></div>
              <div className="fg"><label className="fl">終了時刻</label>
                <input className="fi fi-sm" type="time" value={een} onChange={e=>setEen(e.target.value)}/></div>
            </div>
            <div className="fg"><label className="fl">カテゴリ</label><div className="chips">
              {CATS.map(c=><Chip key={c} v={c} cur={ecat} set={setEcat} label={c}
                style={ecat===c?{borderColor:CAT[c],background:CAT[c]+'22',color:CAT[c]}:{}}/>)}</div></div>
            <div className="fg">
              <label className="fl">メモ（任意）</label>
              <input className="fi fi-sm" placeholder="場所・持ち物など" value={enote} onChange={e=>setEnote(e.target.value)}/>
            </div>
          </>
        )}

        <button className="btn-add" onClick={submit}>{isEdit?'更新する ✓':'追加する ✓'}</button>
        <button className="btn-cancel" onClick={onClose}>キャンセル</button>
      </div>
    </div>
  );
}

// ===== COUNTDOWN BANNER =====
const EXAM_KEYS=['試験','テスト','発表','締切','提出','レポート','期末','中間','quiz','Quiz','exam'];
function CountdownBanner({events}){
  const now=new Date();now.setHours(0,0,0,0);
  const upcoming=events
    .map(e=>{const d=new Date(e.date+'T00:00:00');return{...e,days:Math.round((d-now)/(86400000))};})
    .filter(e=>e.days>=0&&e.days<=60&&EXAM_KEYS.some(k=>e.name.includes(k)))
    .sort((a,b)=>a.days-b.days);
  if(!upcoming.length)return null;
  const ev=upcoming[0];
  const d=new Date(ev.date+'T00:00:00');
  return(
    <div className="countdown-card">
      <div className="cd-icon"><IcoPin c="#D97706" s={28}/></div>
      <div style={{flex:1,minWidth:0}}>
        <div className="cd-name">{ev.name}</div>
        <div className="cd-date">{d.getMonth()+1}月{d.getDate()}日（{DOW[d.getDay()]}）</div>
      </div>
      <div style={{textAlign:'center',flexShrink:0}}>
        <div className="cd-days">{ev.days===0?'今日':ev.days}</div>
        <div className="cd-unit">{ev.days===0?'！':'日後'}</div>
      </div>
    </div>

// ===== LOG MODAL =====
function LogModal({onClose,onSave,tasks,dateStr,preTask,slotDur}){
  const initDur=preTask?Math.round((preTask.minDur+preTask.maxDur)/2):(slotDur||30);
  const[selId,setSelId]=useState(preTask?.id??null);
  const[customName,setCustomName]=useState('');
  const[customCat,setCustomCat]=useState('その他');
  const[dur,setDur]=useState(initDur);
  const isCustom=selId===null;
  const selTask=tasks.find(t=>t.id===selId);

  const addDur=n=>setDur(p=>Math.max(5,p+n));

  const submit=()=>{
    if(isCustom&&!customName.trim())return;
    if(!isCustom&&!selTask)return;
    onSave({
      taskId:isCustom?null:selId,
      name:isCustom?customName.trim():selTask.name,
      duration:dur,
      category:isCustom?customCat:selTask.category,
      date:dateStr,
    });
    onClose();
  };

  const Chip=({v,cur,set,label,style})=>(
    <button className={`chip${cur===v?' on':''}`} style={style} onClick={()=>set(v)}>{label}</button>
  );

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="mtitle" style={{display:'flex',alignItems:'center',gap:7}}><IcoTimerSvg s={20}/>何をしましたか？</div>

        <div className="log-section">
          <div className="log-section-title">タスクから選ぶ</div>
          <div className="task-chips">
            {tasks.map(t=>(
              <button key={t.id} className={`task-chip${selId===t.id?' on':''}`} onClick={()=>setSelId(t.id)}>
                <span className="task-chip-dot" style={{background:CAT[t.category]||'#CBD5E1'}}/>
                {t.name}
              </button>
            ))}
            <button className={`task-chip${isCustom?' on':''}`} onClick={()=>setSelId(null)}>
              <PencilIcon size={16}/> その他
            </button>
          </div>
        </div>

        {isCustom&&(
          <div className="log-section">
            <div className="log-section-title">内容を入力</div>
            <input className="fi" placeholder="例：自主学習、読書、散歩…" value={customName} onChange={e=>setCustomName(e.target.value)}/>
            <div style={{marginTop:8}}><div className="chips">
              {CATS.map(c=><Chip key={c} v={c} cur={customCat} set={setCustomCat} label={c}
                style={customCat===c?{borderColor:CAT[c],background:CAT[c]+'22',color:CAT[c]}:{}}/>)}
            </div></div>
          </div>
        )}

        <div className="log-section">
          <div className="log-section-title">何分やりましたか？</div>
          <div className="dur-row">
            <button className="dur-btn" onClick={()=>addDur(-5)}>－</button>
            <div className="dur-num">{dur}</div>
            <div className="dur-unit">分</div>
            <button className="dur-btn" onClick={()=>addDur(+5)}>＋</button>
          </div>
        </div>

        <button className="btn-add" onClick={submit}>記録する ✓</button>
        <button className="btn-cancel" onClick={onClose}>キャンセル</button>
      </div>
    </div>
  );
}

// ===== STATS SCREEN =====
function StatsScreen({data}){
  const now=new Date();
  const yr=now.getFullYear(),mo=now.getMonth()+1;
  const monthStr=`${yr}-${String(mo).padStart(2,'0')}`;
  const monthLabel=`${yr}年${mo}月`;

  const taskMap=Object.fromEntries(data.tasks.map(t=>[t.id,t]));
  const monthLogs=(data.logs||[]).filter(l=>l.date.startsWith(monthStr));
  // also count completions that have no log entry (checked off without logging)
  const allDates=Object.keys(data.completions||{}).filter(d=>d.startsWith(monthStr)).sort();
  const loggedTaskDayKeys=new Set(monthLogs.filter(l=>l.taskId!=null).map(l=>`${l.date}_${l.taskId}`));

  let totalDone=0,studyMin=0;
  const catCounts={};
  const doneDays=new Set();
  const recentDone=[];

  // From logs (most accurate — has real duration)
  for(const l of monthLogs){
    if(l.date)doneDays.add(l.date);
    totalDone++;
    studyMin+=l.category==='勉強'?l.duration:0;
    catCounts[l.category]=(catCounts[l.category]||0)+1;
    recentDone.push({date:l.date,name:l.name,dur:l.duration,cat:l.category});
  }
  // From completions without a log (checkbox-only)
  for(const date of allDates){
    for(const id of (data.completions[date]||[])){
      if(loggedTaskDayKeys.has(`${date}_${id}`))continue;
      const t=taskMap[id];if(!t)continue;
      doneDays.add(date);totalDone++;
      const dur=Math.round((t.minDur+t.maxDur)/2);
      studyMin+=t.category==='勉強'?dur:0;
      catCounts[t.category]=(catCounts[t.category]||0)+1;
      recentDone.push({date,name:t.name,dur,cat:t.category});
    }
  }

  // Streak: consecutive days with ≥1 completion (today counts even if not yet done)
  let streak=0;
  const sd=new Date();
  if(!(data.completions[toStr(sd)]||[]).length) sd.setDate(sd.getDate()-1);
  while((data.completions[toStr(sd)]||[]).length>0){streak++;sd.setDate(sd.getDate()-1);}

  const studyH=Math.floor(studyMin/60),studyM=studyMin%60;
  const maxCat=Math.max(1,...Object.values(catCounts));
  const sortedCats=Object.entries(catCounts).sort((a,b)=>b[1]-a[1]);
  const recent=[...recentDone].reverse().slice(0,15);

  return(
    <div>
      <div className="stats-hero">
        <div className="stats-hero-label">{monthLabel}の達成タスク</div>
        <div className="stats-hero-row">
          <div className="stats-hero-num">{totalDone}</div>
          <div className="stats-hero-unit">件完了</div>
        </div>
        <div className="stats-hero-sub">{doneDays.size}日間コツコツ積み上げた</div>
      </div>

      <div className="stats-cards">
        <div className="stat-card">
          <div className="stat-card-icon" style={{background:'#FEF9C3'}}>
            <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
              <path d="M16 4 L20 12 L28 13 L22 19 L23.5 28 L16 24 L8.5 28 L10 19 L4 13 L12 12Z" fill="#FDE68A" stroke="#FBBF24" strokeWidth="1.8" strokeLinejoin="round"/>
            </svg>
          </div>
          <div className="stat-card-val">{studyH>0?`${studyH}h`:''}{studyM>0?`${studyM}m`:studyMin===0?'0m':''}</div>
          <div className="stat-card-label">勉強時間の合計</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon" style={{background:'#FEE2E2'}}>
            <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
              <path d="M16 6 C16 6 8 10 8 18 C8 22.4 11.6 26 16 26 C20.4 26 24 22.4 24 18 C24 10 16 6 16 6Z" fill="#FCA5A5" stroke="#F87171" strokeWidth="1.6"/>
              <path d="M16 18 L16 12" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/>
            </svg>
          </div>
          <div className="stat-card-val">{streak}</div>
          <div className="stat-card-label">日連続達成</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon" style={{background:'#D1FAE5'}}>
            <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
              <rect x="6" y="6" width="20" height="20" rx="5" fill="#A7F3D0" stroke="#34D399" strokeWidth="1.8"/>
              <path d="M10 16 L14 20 L22 12" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <div className="stat-card-val">{doneDays.size}</div>
          <div className="stat-card-label">達成した日数</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon" style={{background:'var(--pl)'}}>
            <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="16" r="10" fill="var(--primary-mid)" stroke="var(--primary)" strokeWidth="1.8" opacity="0.7"/>
              <path d="M16 10 L16 16 L20 19" stroke="var(--primary)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <div className="stat-card-val">{totalDone>0?Math.round(studyMin/totalDone*10)/10:0}</div>
          <div className="stat-card-label">平均集中時間(分)</div>
        </div>
      </div>

      {sortedCats.length>0&&(
        <>
          <div className="section-title">カテゴリ別</div>
          <div style={{background:'#fff',borderRadius:'var(--rs)',padding:'12px 14px',boxShadow:'var(--shadow)',marginBottom:14}}>
            {sortedCats.map(([cat,cnt])=>(
              <div className="cat-bar-row" key={cat}>
                <div className="cat-bar-label" style={{color:CAT[cat]||'#CBD5E1'}}>{cat}</div>
                <div className="cat-bar-bg">
                  <div className="cat-bar-fill" style={{width:`${(cnt/maxCat)*100}%`,background:CAT[cat]||'#CBD5E1'}}/>
                </div>
                <div className="cat-bar-count">{cnt}</div>
              </div>
            ))}
          </div>
        </>
      )}

      {recent.length>0&&(
        <>
          <div className="section-title">最近の完了タスク</div>
          <div className="done-list">
            {recent.map((r,i)=>{
              const d=new Date(r.date+'T00:00:00');
              return(
                <div className="done-item" key={i}>
                  <div className="done-item-date">{d.getMonth()+1}/{d.getDate()}</div>
                  <div className="cdot" style={{background:CAT[r.cat]||'#CBD5E1',width:8,height:8,borderRadius:'50%',flexShrink:0}}/>
                  <div className="done-item-name">{r.name}</div>
                  <div className="done-item-dur">{r.dur}分</div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {totalDone===0&&(
        <div className="empty">
          <div className="empty-icon"><EmptyIllustStats/></div>
          <div className="empty-text">今月はまだ記録がありません。<br/>タスクを完了するとここに表示されるよ！</div>
        </div>
      )}
    </div>
  );
}

function App(){
  const[user,setUser]=useState(undefined); // undefined=初期化中, null=未ログイン, obj=ログイン済
  const[isGuest,setIsGuest]=useState(false);
  const[data,setData]=useState(null);
  const[tab,setTab]=useState('today');
  const[selDate,setSelDate]=useState(null);
  const[calMode,setCalMode]=useState('month'); // 'month'|'week'
  const[showAdd,setShowAdd]=useState(false);
  const[addMode,setAddMode]=useState('task');
  const[addDate,setAddDate]=useState('');
  const[editItem,setEditItem]=useState(null);
  const[pomodoroTask,setPomodoroTask]=useState(undefined); // undefined=closed, null=no task, task obj=preset
  const[themeId,setThemeId]=useState(()=>localStorage.getItem(SK_THEME)||'lavender');
  const[showTheme,setShowTheme]=useState(false);

  useEffect(()=>{applyTheme(themeId);},[themeId]);
  const changeTheme=id=>{setThemeId(id);localStorage.setItem(SK_THEME,id);setShowTheme(false);};

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async u=>{
      setUser(u);
      if(u){
        try{
          const doc=await db.collection('users').doc(u.uid).collection('data').doc('main').get();
          if(doc.exists){
            setData(migrate(doc.data()));
          } else {
            // 初回ログイン: localStorageからマイグレーション or デフォルト
            const local=loadLocal();
            const d=local||defaults();
            setData(d);
            saveFirestore(u.uid,d);
          }
        }catch(e){console.error(e);setData(defaults());}
      } else {
        setData(null);
      }
    });
    return()=>unsub();
  },[]);

  const mutate=useCallback(fn=>{
    setData(prev=>{
      const next=fn(prev);
      if(auth.currentUser)saveFirestore(auth.currentUser.uid,next);
      return next;
    });
  },[isGuest]);

  const handleAdd=item=>{
    mutate(prev=>{
      const id=prev.nextId;
      if(item.type==='task'){
        const{type,...t}=item;
        return{...prev,tasks:[...prev.tasks,{...t,id}],nextId:id+1};
      }else if(item.type==='fixed'){
        const{type,...b}=item;
        return{...prev,fixedBlocks:[...prev.fixedBlocks,{...b,id}],nextId:id+1};
      }else{
        const{type,...e}=item;
        return{...prev,events:[...prev.events,{...e,id}],nextId:id+1};
      }
    });
  };

  const handleUpdate=item=>{
    mutate(prev=>{
      if(item.type==='task'){
        const{type,...t}=item;
        return{...prev,tasks:prev.tasks.map(x=>x.id===t.id?{...x,...t}:x)};
      }else if(item.type==='fixed'){
        const{type,...b}=item;
        return{...prev,fixedBlocks:prev.fixedBlocks.map(x=>x.id===b.id?{...x,...b}:x)};
      }else{
        const{type,...e}=item;
        return{...prev,events:prev.events.map(x=>x.id===e.id?{...x,...e}:x)};
      }
    });
  };

  const delTask  =id=>mutate(p=>({...p,tasks:p.tasks.filter(t=>t.id!==id)}));
  const delFixed =id=>mutate(p=>({...p,fixedBlocks:p.fixedBlocks.filter(b=>b.id!==id)}));
  const delEvent =id=>mutate(p=>({...p,events:p.events.filter(e=>e.id!==id)}));

  const toggleSkip=(dateStr,blockId)=>{
    mutate(prev=>{
      const skips={...prev.skips||{}};
      const day=skips[dateStr]||[];
      skips[dateStr]=day.includes(blockId)?day.filter(id=>id!==blockId):[...day,blockId];
      return{...prev,skips};
    });
  };

  const toggleCompletion=(taskId,dateStr)=>{
    mutate(prev=>{
      const comp=prev.completions||{};
      const dayList=comp[dateStr]||[];
      const next=dayList.includes(taskId)?dayList.filter(id=>id!==taskId):[...dayList,taskId];
      return{...prev,completions:{...comp,[dateStr]:next}};
    });
  };

  const handleLog=entry=>{
    mutate(prev=>{
      const id=prev.nextId;
      const newLog={...entry,id};
      // mark completion if linked to a task
      let comp=prev.completions||{};
      if(entry.taskId!=null){
        const day=comp[entry.date]||[];
        if(!day.includes(entry.taskId))
          comp={...comp,[entry.date]:[...day,entry.taskId]};
      }
      return{...prev,logs:[...prev.logs,newLog],completions:comp,nextId:id+1};
    });
  };

  const openAdd=(mode,date='')=>{
    setEditItem(null);setAddMode(mode);setAddDate(date);setShowAdd(true);
  };
  const openEdit=(item,mode)=>{
    setEditItem(item);setAddMode(mode);setShowAdd(true);
  };

  // ローディング・未ログイン
  if(user===undefined||(user&&data===null)){
    return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100dvh',flexDirection:'column',gap:16}}>

  const todayFixed=data.fixedBlocks.filter(b=>(b.days||ALL_DAYS).includes(todayDow));
  const todayFree=getFreeSlots([...todayFixed,...data.events.filter(e=>e.date===todayStr)]);
  const tf=todayFree.reduce((s,sl)=>s+sl.dur,0);
  const tfh=Math.floor(tf/60),tfm=tf%60;

  const NavToday=({active})=>{const c=active?'var(--primary)':'#A09AB8';return(
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none">

      <path d="M16 11 L16 17 L20 20" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <path d="M11 5 L14 8 M21 5 L18 8" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>
    </svg>
  );};
  const NavCal=({active})=>{const c=active?'var(--primary)':'#A09AB8';return(
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
      <rect x="4" y="7" width="24" height="21" rx="5" fill={active?'var(--pl)':'var(--pale)'} stroke={c} strokeWidth="2"/>
      <path d="M4 13h24" stroke={c} strokeWidth="1.5"/>
      <rect x="10" y="3" width="3" height="7" rx="1.5" fill={c}/>
      <rect x="19" y="3" width="3" height="7" rx="1.5" fill={c}/>
      <circle cx="11" cy="20" r="2" fill={c} opacity="0.7"/>
